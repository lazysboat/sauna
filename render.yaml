# Render Blueprint — deploys both surfaces:
#   sauna-agent      FastAPI backend + agent terminal UI (web service, Starter)
#   sauna-directory  Next.js sauna directory, statically exported (static site, free)
# ClickHouse Cloud stays external; its host/password are pasted into the env
# vars below when creating the Blueprint (sync: false → dashboard prompts).
#
# Deploy: push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
services:
  - type: web
    name: sauna-agent
    runtime: python
    plan: starter              # always-on: no cold starts during the demo
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false              # set in dashboard
      - key: CLAUDE_MODEL
        value: claude-opus-4-8
      - key: CLICKHOUSE_HOST
        sync: false              # set in dashboard
      - key: CLICKHOUSE_PASSWORD
        sync: false              # set in dashboard
      - key: CLICKHOUSE_PORT
        value: "8443"
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_DATABASE
        value: default
      - key: CLICKHOUSE_SECURE
        value: "true"

  - type: web
    name: sauna-directory
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false              # paste the sauna-agent URL (https://sauna-agent.onrender.com)
